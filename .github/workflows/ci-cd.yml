# .github/workflows/ci-cd.yml
# GitHub Actions CI/CD pipeline for Project 07
#
# On push to main:
#   1. Run tests
#   2. Build Docker image
#   3. Push to AWS ECR
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID        - IAM user muhammed-keita-cli access key
#   AWS_SECRET_ACCESS_KEY    - IAM user muhammed-keita-cli secret key
#   DAGSHUB_TOKEN            - DagsHub API token

name: CI/CD — Build, Test, Push to ECR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 597819998212.dkr.ecr.eu-west-1.amazonaws.com
  ECR_REPOSITORY: fraud-detection-api

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
                       .

      - name: Push to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Summary
        run: |
          echo "## Docker Image Pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: $ECR_REGISTRY" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: $ECR_REPOSITORY" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: latest, ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
